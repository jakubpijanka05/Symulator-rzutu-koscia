name: CI

on:
  push:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install pytest flake8

      - name: Lint
        run: flake8 . || true
      - name: Tests
        run: pytest

      - name: Logowanie do Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build obrazu
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/dice-simulator:latest .

      - name: Push obrazu
        run: docker push ${{ secrets.DOCKER_USERNAME }}/dice-simulator:latest
